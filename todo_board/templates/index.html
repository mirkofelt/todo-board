<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Todo Queue</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a; color: #e2e8f0;
  min-height: 100vh; padding: 32px 16px;
}
.container { max-width: 680px; margin: 0 auto; }
h1 { font-size: 20px; color: #10b981; margin-bottom: 20px; display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.h1-stats { font-size: 11px; font-family: monospace; color: #334155; font-weight: 400; white-space: nowrap; }
#last-activity {
  font-size: 12px; color: #475569; font-family: monospace;
  margin-top: -14px; margin-bottom: 18px;
}

.add-form { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; margin-bottom: 32px; }
.add-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.add-row:last-child { margin-bottom: 0; }
textarea, input[type="text"] {
  background: #0f172a; border: 1px solid #334155; border-radius: 6px;
  color: #f1f5f9; padding: 9px 12px; font-size: 13px; font-family: inherit;
}
textarea { flex: 1; min-width: 200px; resize: vertical; min-height: 42px; }
textarea:focus, input[type="text"]:focus, select:focus { outline: none; border-color: #10b981; }
select {
  background: #0f172a; border: 1px solid #334155; border-radius: 6px;
  color: #94a3b8; padding: 9px 12px; font-size: 13px; cursor: pointer;
  flex: 1; min-width: 140px;
}
select.error { border-color: #ef4444; }
#new-project-wrap { display: none; flex: 1; }
#new-project-wrap input { width: 100%; }
button {
  background: #10b981; color: #fff; border: none;
  border-radius: 6px; padding: 8px 18px;
  font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
button:hover { background: #059669; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-ghost { background: none; border: 1px solid #334155; color: #64748b; }
.btn-ghost:hover { border-color: #94a3b8; color: #e2e8f0; background: none; }
.btn-icon { background: none; border: none; color: #334155; font-size: 16px; padding: 3px 7px; cursor: pointer; }
.btn-icon:hover { color: #ef4444; }

.section { margin-bottom: 36px; }
.section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: #475569; font-weight: 500; margin-bottom: 12px;
}

.todo-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: #1e293b; border: 1px solid #334155; border-radius: 8px;
  padding: 0 14px 11px; margin-bottom: 8px;
  flex-direction: column; overflow: hidden;
}
.todo-row {
  display: flex; align-items: flex-start; gap: 10px; width: 100%;
}
.todo-statusbar {
  width: calc(100% + 28px); height: 4px;
  margin: 0 -14px 10px;
  border-radius: 7px 7px 0 0;
  background: #263347;
}
.todo-statusbar.pending { background: #334155; }
.todo-statusbar.in-progress {
  background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 40%, #f59e0b 100%);
  background-size: 200% 100%;
  animation: shimmer 1.6s linear infinite;
}
.todo-statusbar.done { background: #10b981; }
.todo-statusbar.blocked { background: #ef4444; }
.todo-statusbar.failed { background: #ef4444; }
.todo-statusbar.canceled { background: #ca8a04; }
.todo-statusbar.context-limit {
  background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 60%, #78350f 100%);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.todo-item.done { opacity: .35; transition: opacity .15s; }
.todo-item.done:hover { opacity: 1; }
.todo-item.done .todo-text { text-decoration: line-through; color: #475569; }
.todo-item.in-progress { border-color: #f59e0b; background: #1c1a10; }
.todo-item.blocked { border-color: #ef4444; background: #1a0e0e; }
.todo-item.failed { border-color: #ef4444; background: #1a0e0e; }
.todo-item.context-limit { border-color: #f59e0b; background: #1c1800; }
.todo-item.canceled { border-color: #ca8a04; background: #1c1800; opacity: .5; }

.todo-body { flex: 1; min-width: 0; }
.todo-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.todo-note {
  font-size: 12px; color: #94a3b8; margin-top: 5px; font-style: italic;
  border-left: 2px solid #334155; padding-left: 8px; line-height: 1.5;
}
.todo-progress {
  font-size: 11px; color: #f59e0b; margin-top: 5px;
  font-family: monospace; opacity: .85;
}
.todo-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; padding-left: 32px; width: 100%; }

.badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
  background: #0f172a; border: 1px solid #334155; color: #64748b;
  text-transform: uppercase; letter-spacing: .05em;
}
.status-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; gap: 4px;
}
.status-badge.in-progress { background: #451a03; border: 1px solid #f59e0b; color: #f59e0b; }
.status-badge.blocked { background: #1e0a0a; border: 1px solid #ef4444; color: #ef4444; }
.status-badge.failed { background: #1e0a0a; border: 1px solid #ef4444; color: #ef4444; }
.status-badge.context-limit { background: #1c1800; border: 1px solid #f59e0b; color: #fbbf24; }
.status-badge.canceled { background: #1c1400; border: 1px solid #ca8a04; color: #ca8a04; }
.status-badge.done-label { background: #0d2318; border: 1px solid #10b981; color: #10b981; }
.btn-cancel { background: none; border: 1px solid #ca8a04; color: #ca8a04; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-cancel:hover { background: #1c1400; border-color: #f59e0b; color: #f59e0b; }
.btn-resume { background: none; border: 1px solid #f59e0b; color: #f59e0b; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-resume:hover { background: #1c1800; border-color: #fbbf24; color: #fbbf24; }
.pulse {
  width: 6px; height: 6px; border-radius: 50%; background: #f59e0b;
  animation: pulse 1.2s ease-in-out infinite;
}
.pulse-green {
  width: 6px; height: 6px; border-radius: 50%; background: #10b981;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(.7); }
}

.meta-time { font-size: 11px; color: #334155; margin-left: auto; }
.meta-stats { font-size: 10px; color: #334155; font-family: monospace; }
.todo-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: flex-start; padding-top: 1px; }
.empty { color: #334155; font-size: 13px; padding: 8px 0; }
.todo-circle { flex-shrink: 0; margin-top: 3px; }
@keyframes todo-circle-fill {
  to { stroke-dashoffset: 0; }
}
.divider { border: none; border-top: 1px solid #1e293b; margin: 16px 0; }

details { margin-bottom: 28px; }
details summary {
  cursor: pointer; user-select: none; list-style: none;
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: #475569; font-weight: 500; padding: 4px 0;
}
details summary::before { content: "▶  "; font-size: 9px; }
details[open] summary::before { content: "▼  "; }
details[open] summary { margin-bottom: 14px; }

.projects-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.proj-chip {
  display: flex; align-items: center; gap: 6px;
  background: #1e293b; border: 1px solid #334155; border-radius: 20px;
  padding: 4px 12px; font-size: 12px; color: #94a3b8;
}
.add-project-row { display: flex; gap: 8px; }
.add-project-row input { flex: 1; }

.btn-edit { background: none; border: none; color: #475569; font-size: 15px; padding: 3px 6px; cursor: pointer; line-height: 1; }
.btn-edit:hover { color: #10b981; }
.todo-item.editing { border-color: #10b981; background: #0d1f1a; }
.todo-statusbar.editing { background: #10b981; opacity: .45; }
.todo-edit-form { width: 100%; }
.todo-edit-textarea {
  width: 100%; background: #0f172a; border: 1px solid #10b981; border-radius: 6px;
  color: #f1f5f9; padding: 9px 12px; font-size: 13px; font-family: inherit;
  resize: vertical; min-height: 60px; margin-bottom: 8px; display: block;
}
.todo-edit-textarea:focus { outline: none; border-color: #34d399; }
.todo-edit-actions { display: flex; gap: 8px; }
.req-textarea {
  width: 100%; background: #1e293b; border: 1px solid #334155;
  border-radius: 8px; color: #94a3b8; padding: 12px 14px;
  font-size: 12px; font-family: monospace; resize: vertical; min-height: 200px;
  line-height: 1.7; margin-bottom: 8px;
}
.req-textarea:focus { outline: none; border-color: #10b981; }
.save-row { display: flex; align-items: center; gap: 10px; }
.save-status { font-size: 11px; color: #10b981; }
</style>
</head>
<body>
<div class="container">
  <h1>Todo Queue<span class="h1-stats" id="h1-stats"></span></h1>
  <div id="last-activity" style="display:none"></div>

  <div class="add-form">
    <div class="add-row">
      <textarea id="new-todo" placeholder="New task… (Enter to submit, Shift+Enter for newline)" rows="1"></textarea>
    </div>
    <div class="add-row">
      <select id="project-select">
        <option value="">— No project —</option>
      </select>
      <div id="new-project-wrap">
        <input type="text" id="new-project-name" placeholder="Project name…">
      </div>
      <button id="add-btn">Add</button>
    </div>
  </div>

  <div class="section" id="pending-section">
    <div class="section-label">Pending</div>
    <div id="pending-list"></div>
  </div>

  <div class="section" id="inprogress-section">
    <div class="section-label">In Progress</div>
    <div id="inprogress-list"></div>
  </div>

  <div class="section" id="done-section">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span>Done</span>
      <button class="btn-sm btn-ghost" id="clear-done-btn" onclick="clearAllDone()" style="text-transform:none;letter-spacing:0;font-size:11px">🗑️ Clear</button>
    </div>
    <div id="done-list"></div>
    <details id="done-overflow" style="display:none;margin-bottom:0">
      <summary id="done-overflow-summary"></summary>
      <div id="done-overflow-list"></div>
    </details>
  </div>

  <div class="section" id="canceled-section">
    <div class="section-label">Canceled</div>
    <div id="canceled-list"></div>
  </div>

  <details id="req-details">
    <summary>Global Requirements</summary>
    <textarea class="req-textarea" id="req-textarea"></textarea>
    <div class="save-row">
      <button class="btn-sm btn-ghost" id="save-req-btn">Save</button>
      <span class="save-status" id="req-status"></span>
    </div>
  </details>
</div>

<script>
let projects = [];
let todos = [];
let cumulativeStats = {total_input_tokens: 0, total_output_tokens: 0, total_duration_secs: 0};
const editingTodos = new Map(); // id -> current edit text in textarea

function captureEditState() {
  document.querySelectorAll('.todo-edit-textarea').forEach(ta => {
    const id = parseInt(ta.dataset.todoId);
    if (!isNaN(id)) editingTodos.set(id, ta.value);
  });
}

async function loadAll() {
  [projects, todos, cumulativeStats] = await Promise.all([
    fetch("/api/projects").then(r => r.json()),
    fetch("/api/todos").then(r => r.json()),
    fetch("/api/stats").then(r => r.json()),
  ]);
  renderDropdown();
  renderTodos();
}

async function loadReq() {
  document.getElementById("req-textarea").value = await fetch("/api/requirements").then(r => r.text());
}

function renderDropdown() {
  const sel = document.getElementById("project-select");
  const cur = sel.value;
  sel.innerHTML = '<option value="">— No project —</option>' +
    projects.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join("") +
    '<option value="__new__">+ New project…</option>';
  if (cur) sel.value = cur;
}

function renderTodos() {
  // Drop edit state for todos that are no longer locked
  editingTodos.forEach((_, id) => {
    const todo = todos.find(t => t.id === id);
    if (!todo || !todo.locked) editingTodos.delete(id);
  });
  const projMap = Object.fromEntries(projects.map(p => [p.id, p.name]));
  const pending = todos.filter(t => !t.done && t.status !== "in_progress" && t.status !== "canceled");
  const inProgress = todos.filter(t => t.status === "in_progress");
  const done = todos.filter(t => t.done || t.status === "canceled");

  document.getElementById("pending-section").style.display = pending.length ? "" : "none";
  document.getElementById("pending-list").innerHTML =
    pending.map(t => todoHtml(t, projMap)).join("") || "";

  document.getElementById("inprogress-section").style.display = inProgress.length ? "" : "none";
  document.getElementById("inprogress-list").innerHTML =
    inProgress.map(t => todoHtml(t, projMap)).join("") || "";

  const recentDone = done.slice(0, 3);
  const olderDone = done.slice(3);

  document.getElementById("done-section").style.display = done.length ? "" : "none";
  document.getElementById("done-list").innerHTML =
    recentDone.map(t => todoHtml(t, projMap)).join("") || "";

  const doneOverflow = document.getElementById("done-overflow");
  if (olderDone.length > 0) {
    document.getElementById("done-overflow-list").innerHTML =
      olderDone.map(t => todoHtml(t, projMap)).join("");
    document.getElementById("done-overflow-summary").textContent =
      `${olderDone.length} more…`;
    doneOverflow.style.display = "";
  } else {
    doneOverflow.style.display = "none";
  }

  document.getElementById("canceled-section").style.display = "none";

  // Total token/runtime summary in heading — includes cumulative stats from deleted tasks
  const finished = todos.filter(t => t.done || t.status === "failed" || t.status === "context_limit" || t.status === "canceled");
  let totalIn = cumulativeStats.total_input_tokens || 0;
  let totalOut = cumulativeStats.total_output_tokens || 0;
  let totalSecs = cumulativeStats.total_duration_secs || 0;
  for (const t of finished) {
    if (t.tokens) { totalIn += t.tokens.input || 0; totalOut += t.tokens.output || 0; }
    if (t.duration_secs != null) totalSecs += t.duration_secs;
  }
  const statsEl = document.getElementById("h1-stats");
  if (totalIn > 0 || totalOut > 0 || totalSecs > 0) {
    const tm = Math.floor(totalSecs / 60), ts2 = totalSecs % 60;
    const rtPart = totalSecs > 0 ? (tm > 0 ? `${tm}m ${ts2}s` : `${ts2}s`) : null;
    const tokPart = (totalIn > 0 || totalOut > 0) ? `${fmtTokCount(totalIn)}/${fmtTokCount(totalOut)}` : null;
    statsEl.textContent = [tokPart, rtPart].filter(Boolean).join(" · ");
  } else {
    statsEl.textContent = "";
  }

  updateLastActivity();
}

function progressCircleHtml(t) {
  const r = 8, size = 22, cx = size / 2, cy = size / 2;
  const circ = (2 * Math.PI * r).toFixed(2);
  if (t.done) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="todo-circle" aria-hidden="true"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#10b981"/><polyline points="7,12 10,15 15,8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
  if (t.status === 'failed' || t.status === 'blocked') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="todo-circle" aria-hidden="true"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#ef4444"/><line x1="8" y1="8" x2="14" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="8" x2="8" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>`;
  }
  if (t.status === 'context_limit') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="todo-circle" aria-hidden="true"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#f59e0b"/><text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">!</text></svg>`;
  }
  if (t.status === 'canceled') {
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="todo-circle" aria-hidden="true"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#475569" stroke-width="2"/></svg>`;
  }
  if (t.status === 'in_progress') {
    const elapsed = (Date.now() / 1000) - (t.status_updated_at || 0);
    const delay = (-Math.min(elapsed, 299)).toFixed(1);
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="todo-circle" aria-hidden="true"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e293b" stroke-width="2.5"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="animation:todo-circle-fill 300s linear forwards;animation-delay:${delay}s"/></svg>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="todo-circle" aria-hidden="true"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#334155" stroke-width="2"/></svg>`;
}

function todoHtml(t, projMap) {
  const inProgress = t.status === "in_progress";
  const isBlocked = t.status === "blocked";
  const isFailed = t.status === "failed";
  const isContextLimit = t.status === "context_limit";
  const isCanceled = t.status === "canceled";
  const isDone = t.done;
  const isLocked = !!t.locked;

  const idBadge = `<span style="color:#475569;font-size:11px;font-family:monospace;flex-shrink:0">#${t.id}</span>`;

  const badge = t.project_id && projMap[t.project_id]
    ? `<span class="badge">${esc(projMap[t.project_id])}</span>` : "";

  const ts = new Date(t.created * 1000).toLocaleString("de-DE", {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});

  // Render inline edit form when locked
  if (isLocked) {
    const editVal = editingTodos.has(t.id) ? editingTodos.get(t.id) : t.text;
    return `<div class="todo-item editing">
      <div class="todo-statusbar editing"></div>
      <div class="todo-row">
        ${progressCircleHtml(t)}
        <div class="todo-body">
          <div class="todo-edit-form">
            <textarea class="todo-edit-textarea" data-todo-id="${t.id}" rows="3">${esc(editVal)}</textarea>
            <div class="todo-edit-actions">
              <button class="btn-sm" onclick="saveEdit(${t.id})">Save</button>
              <button class="btn-sm btn-ghost" onclick="cancelEdit(${t.id})">Cancel</button>
            </div>
          </div>
          ${t.note ? `<div class="todo-note">${esc(t.note)}</div>` : ""}
        </div>
        <div class="todo-actions"></div>
      </div>
      <div class="todo-meta">${idBadge}${badge}<span class="status-badge" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#0d2318;border:1px solid #10b981;color:#10b981;text-transform:uppercase;letter-spacing:.06em">✎ Editing</span><span class="meta-time">${ts}</span></div>
    </div>`;
  }

  let statusBadge = "";
  if (isDone) {
    statusBadge = `<span class="status-badge done-label">Done ✓</span>`;
  } else if (inProgress) {
    statusBadge = `<span class="status-badge in-progress"><span class="pulse"></span>Working…</span>`;
  } else if (isBlocked) {
    statusBadge = `<span class="status-badge blocked">⚠ Blocked</span>`;
  } else if (isFailed) {
    statusBadge = `<span class="status-badge failed">✗ Failed</span>`;
  } else if (isContextLimit) {
    statusBadge = `<span class="status-badge context-limit">⚡ Interrupted</span>`;
  } else if (isCanceled) {
    statusBadge = `<span class="status-badge canceled">⊗ Canceled</span>`;
  }

  let statsHtml = "";
  if (isDone || isFailed || isCanceled) {
    const parts = [];
    if (t.duration_secs != null) {
      const m = Math.floor(t.duration_secs / 60);
      const s = t.duration_secs % 60;
      parts.push(`Runtime: ${m > 0 ? `${m}m ${s}s` : `${s}s`}`);
    }
    if (t.tokens && (t.tokens.input || t.tokens.output)) {
      parts.push(`Tokens: ${fmtTokCount(t.tokens.input || 0)}/${fmtTokCount(t.tokens.output || 0)}`);
    }
    if (parts.length > 0) {
      statsHtml = `<span class="meta-stats">${parts.join(" · ")}</span>`;
    }
  } else if (inProgress && t.status_updated_at) {
    const elapsed = Math.floor(Date.now() / 1000) - t.status_updated_at;
    statsHtml = `<span class="meta-stats" data-started-at="${t.status_updated_at}">Runtime: ${fmtElapsed(elapsed)}</span>`;
  }

  let cls = "";
  if (isDone) cls = "done";
  else if (inProgress) cls = "in-progress";
  else if (isBlocked) cls = "blocked";
  else if (isFailed) cls = "failed";
  else if (isContextLimit) cls = "context-limit";
  else if (isCanceled) cls = "canceled";

  const note = t.note ? `<div class="todo-note">${esc(t.note)}</div>` : "";
  const progress = inProgress && t.progress ? `<div class="todo-progress">↳ ${esc(t.progress)}</div>` : "";
  const cancelBtn = inProgress ? `<button class="btn-cancel btn-sm" onclick="cancelTodo(${t.id})" title="Cancel and roll back">⊗ Cancel</button>` : "";
  const resumeBtn = isContextLimit ? `<button class="btn-resume btn-sm" onclick="resumeTodo(${t.id})" title="Resume interrupted task">▶ Continue</button>` : "";
  const editBtn = (t.status === "pending") ? `<button class="btn-edit" onclick="startEdit(${t.id})" title="Edit task">✎</button>` : "";
  const deleteBtn = !inProgress ? `<button class="btn-icon" onclick="del(${t.id})" title="Remove">×</button>` : "";

  return `<div class="todo-item ${cls}">
    <div class="todo-statusbar ${cls || 'pending'}"></div>
    <div class="todo-row">
      ${progressCircleHtml(t)}
      <div class="todo-body">
        <div class="todo-text">${esc(t.text)}</div>
        ${note}
        ${progress}
      </div>
      <div class="todo-actions">${resumeBtn}${cancelBtn}${editBtn}${deleteBtn}</div>
    </div>
    <div class="todo-meta">${idBadge}${badge}${statusBadge}${statsHtml}<span class="meta-time">${ts}</span></div>
  </div>`;
}

async function startEdit(id) {
  const t = todos.find(t => t.id === id);
  if (t) editingTodos.set(id, t.text);
  await fetch("/api/lock/" + id, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({locked: true}),
  });
  todos = await fetch("/api/todos").then(r => r.json());
  renderTodos();
  // Focus the textarea after render
  const ta = document.querySelector(`.todo-edit-textarea[data-todo-id="${id}"]`);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

async function saveEdit(id) {
  const ta = document.querySelector(`.todo-edit-textarea[data-todo-id="${id}"]`);
  const text = ta ? ta.value.trim() : "";
  if (!text) return;
  await fetch("/api/edit/" + id, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text}),
  });
  editingTodos.delete(id);
  todos = await fetch("/api/todos").then(r => r.json());
  renderTodos();
}

async function cancelEdit(id) {
  await fetch("/api/lock/" + id, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({locked: false}),
  });
  editingTodos.delete(id);
  todos = await fetch("/api/todos").then(r => r.json());
  renderTodos();
}

async function del(id) {
  await fetch("/api/delete/" + id, { method: "POST" });
  [todos, cumulativeStats] = await Promise.all([
    fetch("/api/todos").then(r => r.json()),
    fetch("/api/stats").then(r => r.json()),
  ]);
  renderTodos();
}

async function clearAllDone() {
  await fetch("/api/delete-done", { method: "POST" });
  [todos, cumulativeStats] = await Promise.all([
    fetch("/api/todos").then(r => r.json()),
    fetch("/api/stats").then(r => r.json()),
  ]);
  renderTodos();
}

async function cancelTodo(id) {
  await fetch("/api/cancel/" + id, { method: "POST" });
  todos = await fetch("/api/todos").then(r => r.json());
  renderTodos();
}

async function resumeTodo(id) {
  await fetch("/api/resume/" + id, { method: "POST" });
  todos = await fetch("/api/todos").then(r => r.json());
  renderTodos();
}

document.getElementById("project-select").addEventListener("change", function() {
  const wrap = document.getElementById("new-project-wrap");
  wrap.style.display = this.value === "__new__" ? "flex" : "none";
  if (this.value === "__new__") document.getElementById("new-project-name").focus();
});

async function addTodo() {
  const ta = document.getElementById("new-todo");
  const text = ta.value.trim();
  if (!text) return;
  const sel = document.getElementById("project-select");
  if (!sel.value || sel.value === "") {
    sel.classList.add("error");
    sel.focus();
    setTimeout(() => sel.classList.remove("error"), 1500);
    return;
  }
  let projectId = null;
  if (sel.value === "__new__") {
    const name = document.getElementById("new-project-name").value.trim();
    if (!name) { document.getElementById("new-project-name").focus(); return; }
    const data = await fetch("/api/projects/add", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({name}),
    }).then(r => r.json());
    projectId = data.id;
    document.getElementById("new-project-name").value = "";
    document.getElementById("new-project-wrap").style.display = "none";
  } else if (sel.value) {
    projectId = parseInt(sel.value);
  }
  await fetch("/api/add", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text, project_id: projectId}),
  });
  ta.value = "";
  if (projectId) sel.value = String(projectId);
  loadAll();
}

document.addEventListener("keydown", e => {
  if (!e.target.classList.contains("todo-edit-textarea")) return;
  const id = parseInt(e.target.dataset.todoId);
  if (isNaN(id)) return;
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveEdit(id); }
  if (e.key === "Escape") { e.preventDefault(); cancelEdit(id); }
});

document.getElementById("add-btn").addEventListener("click", addTodo);
document.getElementById("new-todo").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addTodo(); }
});

document.getElementById("save-req-btn").addEventListener("click", async () => {
  await fetch("/api/requirements", {
    method: "POST", headers: {"Content-Type":"text/plain"},
    body: document.getElementById("req-textarea").value,
  });
  const s = document.getElementById("req-status");
  s.textContent = "Saved ✓";
  setTimeout(() => s.textContent = "", 2000);
});

function esc(s) {
  return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : "";
}

function relTime(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 10) return "just now";
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function updateLastActivity() {
  const el = document.getElementById("last-activity");
  if (!todos.length) { el.style.display = "none"; return; }

  let latest = null, latestTime = 0;
  for (const t of todos) {
    const ts = t.status_updated_at || t.created || 0;
    if (ts > latestTime) { latestTime = ts; latest = t; }
  }
  if (!latest) { el.style.display = "none"; return; }

  const labels = {
    done: "completed", in_progress: "started", failed: "failed",
    blocked: "blocked", canceled: "canceled", context_limit: "interrupted", pending: "added",
  };
  const label = labels[latest.status] || latest.status;
  el.textContent = `Task #${latest.id} ${label} · ${relTime(latestTime)}`;
  el.style.display = "";
}

function fmtElapsed(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M tok";
  if (n >= 1000) return Math.round(n / 1000) + "k tok";
  return n + " tok";
}

function fmtTokCount(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return Math.round(n / 1000) + "k";
  return String(n);
}

let appVersion = null;
async function checkVersion() {
  const data = await fetch("/api/version").then(r => r.json()).catch(() => null);
  if (!data) return;
  if (appVersion === null) { appVersion = data.version; return; }
  if (data.version !== appVersion) window.location.reload();
}

let lastTodosMtime = null;
async function pollTodos() {
  const data = await fetch("/api/state").then(r => r.json()).catch(() => null);
  if (!data) return;
  if (lastTodosMtime === data.mtime) return;
  lastTodosMtime = data.mtime;
  captureEditState();
  [projects, todos, cumulativeStats] = await Promise.all([
    fetch("/api/projects").then(r => r.json()),
    fetch("/api/todos").then(r => r.json()),
    fetch("/api/stats").then(r => r.json()),
  ]);
  renderDropdown();
  renderTodos();
}

async function init() {
  await loadAll();
  const stateData = await fetch("/api/state").then(r => r.json()).catch(() => null);
  if (stateData) lastTodosMtime = stateData.mtime;
}

init();
loadReq();
checkVersion();
setInterval(pollTodos, 5000);
setInterval(checkVersion, 5000);
setInterval(() => {
  const now = Math.floor(Date.now() / 1000);
  document.querySelectorAll('[data-started-at]').forEach(el => {
    const started = parseInt(el.dataset.startedAt);
    if (!isNaN(started)) el.textContent = `Runtime: ${fmtElapsed(now - started)}`;
  });
  updateLastActivity();
}, 1000);
</script>
</body>
</html>
